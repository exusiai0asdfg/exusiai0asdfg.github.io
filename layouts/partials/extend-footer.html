{{ $siteStart := .Site.Params.custom.siteStart | default "2026-01-18T00:00:00+08:00" }}

<div class="site-meta-panel">
  <div id="runtime" class="site-runtime" data-site-start="{{ $siteStart }}"></div>

  <div id="site-stat-online" class="site-stat" style="display:none;">
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <span id="busuanzi_container_site_pv">
      访问量: <span id="busuanzi_value_site_pv" class="site-stat-value"></span> 次
    </span>
    <span class="site-stat-sep">|</span>
    <span id="busuanzi_container_site_uv">
      访客数: <span id="busuanzi_value_site_uv" class="site-stat-value"></span> 人
    </span>
  </div>

  <div id="site-stat-local" class="site-stat" style="display:none;">
    本地预览模式不统计访问量，部署到正式域名后显示真实数据。
  </div>
</div>

<div class="floating-tools-container">
  <!-- 字体切换 -->
  <div id="font-switcher" aria-label="字体切换">
    <span class="floating-tools-container__badge">Aa</span>
    <select id="font-selector">
      <option value="noto-sans">思源黑体</option>
      <option value="noto-serif">思源宋体</option>
      <option value="zcool">站酷小薇</option>
      <option value="mashan">马善政手写</option>
      <option value="longcang">龙藏书法</option>
    </select>
  </div>

  <!-- 特效切换 -->
  <div id="effect-switcher" aria-label="页面特效">
    <span class="floating-tools-container__badge" style="font-size: 1.1rem; line-height: 1;">✨</span>
    <select id="effect-selector">
      <option value="none">🚫 无特效</option>
      <option value="star">💫 鼠标星光</option>
      <option value="sakura">� 樱花飘落</option>
      <option value="clickword">� 点击浮字</option>
    </select>
  </div>

</div>

<script>
  (function () {
    var fontCssMap = {
      "noto-sans": "https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap",
      "noto-serif": "https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap",
      "zcool": "https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap",
      "mashan": "https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap",
      "longcang": "https://fonts.googleapis.com/css2?family=Long+Cang&display=swap"
    };

    function ensureFontLoaded(name) {
      var href = fontCssMap[name];
      if (!href) return;
      var id = "font-css-" + name;
      if (document.getElementById(id)) return;
      var link = document.createElement("link");
      link.id = id;
      link.rel = "stylesheet";
      link.href = href;
      document.head.appendChild(link);
    }

    function updateRuntime() {
      var runtimeEl = document.getElementById("runtime");
      if (!runtimeEl) return;

      var startRaw = runtimeEl.getAttribute("data-site-start");
      var start = new Date(startRaw);
      if (Number.isNaN(start.getTime())) return;

      var now = new Date();
      var diff = now.getTime() - start.getTime();
      if (diff < 0) diff = 0;

      var dayMs = 24 * 60 * 60 * 1000;
      var days = Math.floor(diff / dayMs);
      var hours = Math.floor((diff % dayMs) / (60 * 60 * 1000));
      var mins = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
      var secs = Math.floor((diff % (60 * 1000)) / 1000);

      runtimeEl.innerHTML = "本站已运行: <span class='site-stat-value'>" + days + "</span> 天 <span class='site-stat-value'>" + hours + "</span> 小时 <span class='site-stat-value'>" + mins + "</span> 分 <span class='site-stat-value'>" + secs + "</span> 秒";
    }

    var isLocal = ["localhost", "127.0.0.1", "::1"].indexOf(window.location.hostname) !== -1;
    var localStat = document.getElementById("site-stat-local");
    var onlineStat = document.getElementById("site-stat-online");
    if (isLocal) {
      if (localStat) localStat.style.display = "block";
      if (onlineStat) onlineStat.style.display = "none";
    } else {
      if (localStat) localStat.style.display = "none";
      if (onlineStat) onlineStat.style.display = "block";
    }

    updateRuntime();
    window.setInterval(updateRuntime, 1000);

    // --- 字体切换逻辑 ---
    var selector = document.getElementById("font-selector");
    var key = "blog-font-choice";
    if (selector) {
      var saved = localStorage.getItem(key);
      if (saved) {
        ensureFontLoaded(saved);
        document.documentElement.setAttribute("data-font", saved);
        selector.value = saved;
      } else {
        ensureFontLoaded("noto-sans");
      }
      selector.addEventListener("change", function () {
        var value = selector.value;
        ensureFontLoaded(value);
        document.documentElement.setAttribute("data-font", value);
        localStorage.setItem(key, value);
      });
    }

    // --- 特效切换逻辑 ---
    var effectSelector = document.getElementById("effect-selector");
    var effectKey = "blog-effect-choice";
    if (effectSelector) {
      var savedEffect = localStorage.getItem(effectKey) || "none";
      effectSelector.value = savedEffect;
      
      if (savedEffect !== 'none') {
        var script = document.createElement('script');
        script.src = '/js/blog-effects.js';
        script.onload = function() {
          if(window.BlogEffects && window.BlogEffects[savedEffect]) {
            window.BlogEffects[savedEffect]();
          }
        };
        document.body.appendChild(script);
      }

      effectSelector.addEventListener("change", function () {
        localStorage.setItem(effectKey, effectSelector.value);
        location.reload(); // 刷新页面以完全清理上一个 Canvas 特效
      });
    }
  })();
</script>

<script defer src="/js/tech-preview.js"></script>
