{{/* layouts/shortcodes/secret.html */}}
{{ $password := .Get "password" }}

<div class="secret-container" style="margin: 20px 0; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: var(--entry);">
    
    <div class="lock-screen" id="lock-{{ .Ordinal }}">
        <div style="text-align: center;">
            <span style="font-size: 3rem;">🔒</span>
            <p>这是一段加密内容，请输入密码查看</p>
            <input type="password" id="pass-input-{{ .Ordinal }}" placeholder="输入密码" style="padding: 5px; border-radius: 4px; border: 1px solid #aaa;">
            <button onclick="unlock('{{ .Ordinal }}', '{{ $password }}')" style="padding: 5px 10px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 4px;">解锁</button>
            <p id="error-{{ .Ordinal }}" style="color: red; display: none; font-size: 0.9rem; margin-top: 5px;">密码错误！</p>
        </div>
    </div>

    <div class="secret-content" id="content-{{ .Ordinal }}" style="display: none;">
        {{ .Inner | markdownify }}
    </div>

</div>

<script>
    function unlock(id, correctPassword) {
        var input = document.getElementById('pass-input-' + id);
        var errorMsg = document.getElementById('error-' + id);
        var lockScreen = document.getElementById('lock-' + id);
        var content = document.getElementById('content-' + id);

        if (input.value === correctPassword) {
            // 密码正确
            lockScreen.style.display = 'none';
            content.style.display = 'block';
            // 可选：把状态存入 sessionStorage，刷新后不用重新输
            sessionStorage.setItem('unlocked-' + id, 'true');
        } else {
            // 密码错误
            errorMsg.style.display = 'block';
            input.value = ''; // 清空输入框
        }
    }
    
    // 页面加载时检查是否已经解锁过
    document.addEventListener("DOMContentLoaded", function() {
        var id = '{{ .Ordinal }}';
        if (sessionStorage.getItem('unlocked-' + id) === 'true') {
            document.getElementById('lock-' + id).style.display = 'none';
            document.getElementById('content-' + id).style.display = 'block';
        }
    });
</script>
