# config/_default/params.toml

colorScheme = "blowfish"
# 全局兜底背景图
defaultBackgroundImage = "wallpaper.png"

[homepage]
  layout = "background"
  image = "wallpaper.png" 
  showRecent = true
  showRecentItems = 5
  showMore = true
  cardView = true

[article]
  showHero = true
  heroStyle = "background"
  showBreadcrumbs = true
  showTaxonomies = false
  # 👇 评论功能合并在这里
  showComments = true 

[list]
  showHero = true
  heroStyle = "background"
  background = "wallpaper.png"
  showSummary = true
  cardView = true
  
[footer]
  showCopyright = true

# 👇 Giscus 评论配置 (已填好你的 ID)
[giscus]
  repo = "exusiai0asdfg/exusiai0asdfg.github.io"
  repoId = "R_kgDOQ5pfUQ"
  category = "General"
  categoryId = "DIC_kwDOQ5pfUc4C1GYH"
  mapping = "pathname"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "top"
  theme = "preferred_color_scheme"
  lang = "zh-CN"
  loading = "lazy"