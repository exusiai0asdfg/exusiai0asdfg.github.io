name: iPhone 发送 Moment 机器人

on:
  issues:
    # 【修复】：冒号后面加上了至关重要的空格！
    types: [opened, labeled]

permissions:
  contents: write

jobs:
  publish_moment:
    if: contains(github.event.issue.labels.*.name, 'moment')
    runs-on: ubuntu-latest
    steps:
      - name: 获取博客最新代码
        # 【修复】：升级到了 v4，消除了黄色的警告
        uses: actions/checkout@v4

      - name: 把手机 Issue 转换成你的博客文章 (TOML格式)
        run: |
          export TZ='Asia/Shanghai'
          ISSUE_DATE=$(jq -r '.issue.created_at' "$GITHUB_EVENT_PATH")
          FORMATTED_DATE=$(date -d "$ISSUE_DATE" +"%Y-%m-%dT%H:%M:%S+08:00")
          FOLDER_NAME=$(date -d "$ISSUE_DATE" +"%Y-%m-%d-%H%M%S")
          
          TARGET_DIR="content/moments/$FOLDER_NAME"
          mkdir -p "$TARGET_DIR"
          
          ISSUE_TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
          
          cat <<EOF > "$TARGET_DIR/index.md"
          +++
          title = "${ISSUE_TITLE}"
          date = "${FORMATTED_DATE}"
          draft = false
          [article]
          showHero = true
          heroStyle = "background"
          +++
          
          ${{ github.event.issue.body }}
          EOF

      - name: 提交并推送到 GitHub (触发 Vercel)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/moments/*
          
          if git diff --staged --quiet; then
            echo "没有新文件需要提交"
          else
            git commit -m "📱 iPhone 自动发布新动态: ${{ github.event.issue.title }}"
            git push
          fi
